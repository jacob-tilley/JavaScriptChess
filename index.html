<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div id="controls">
            <button id="btn-standard">Standard game</button>
            <button id="btn-blitz">Blitz Game</button>
            <button id="btn-restart">Restart</button>
            <button id="btn-forfeit">Forfeit</button>
            <button id="offer-draw">Offer Draw</button>
        </div>
        <div id="timer-container">
            <span id="timer-white"> White: 5:00</span> |
            <span id="timer-black"> Black: 5:00</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>a</th>
                    <th>b</th>
                    <th>c</th>
                    <th>d</th>
                    <th>e</th>
                    <th>f</th>
                    <th>g</th>
                    <th>h</th>   
                </tr>
            </thead>
            <tbody id="board-body">
                
            </tbody>
            <tfoot>
                <tr>
                    <th></th>
                    <th>a</th>
                    <th>b</th>
                    <th>c</th>
                    <th>d</th>
                    <th>e</th>
                    <th>f</th>
                    <th>g</th>
                    <th>h</th>   
                </tr>
            </tfoot>
        </table>
        <script src="index.js"></script>   
    </body>
</html>
